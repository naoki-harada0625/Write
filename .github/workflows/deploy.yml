name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wp-auto-poster/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: wp-auto-poster

      - name: Build
        run: npm run build
        working-directory: wp-auto-poster

      - name: Verify dist output
        run: |
          echo "=== dist contents ==="
          ls -la wp-auto-poster/dist/
          echo "=== index.html asset paths ==="
          grep -E "src=|href=" wp-auto-poster/dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wp-auto-poster/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.sha }}'
